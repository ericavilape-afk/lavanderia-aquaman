<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM · Lavandería Aquaman</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .fade-in { animation: fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

    .status-pendiente { background:#fef9c3; color:#854d0e; }
    .status-listo     { background:#dcfce7; color:#16a34a; }
    .status-recogido  { background:#e0e7ff; color:#3730a3; }
    .notif-si { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    .notif-no { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }

    .wa-btn {
      display:inline-flex; align-items:center; justify-content:center;
      gap:6px; font-weight:600; font-size:.8rem;
      padding:9px 14px; border-radius:8px;
      text-decoration:none; transition:all .15s; white-space:nowrap;
    }
    .wa-btn-nuevo    { background:#22c55e; color:#fff; }
    .wa-btn-nuevo:hover    { background:#16a34a; }
    .wa-btn-reenviar { background:#f0fdf4; color:#16a34a; border:1.5px solid #86efac; }
    .wa-btn-reenviar:hover { background:#dcfce7; }

    /* Nav tabs */
    .nav-tab { transition: all .15s; }
    .nav-tab.activo {
      color:#2563eb; border-bottom:3px solid #2563eb; font-weight:600;
    }
    .tab-activo { background:#2563eb !important; color:#fff !important; border-color:#2563eb !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- HEADER -->
<header class="bg-blue-600 text-white shadow-md">
  <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="text-3xl">🌊</div>
      <div>
        <h1 class="text-xl font-bold leading-tight">Lavandería Aquaman</h1>
        <p class="text-blue-200 text-xs">Sistema de recojo</p>
      </div>
    </div>
    <button id="btn-nuevo" onclick="abrirModalNuevo()"
      class="bg-white text-blue-600 font-semibold px-4 py-2 rounded-lg text-sm hover:bg-blue-50 transition">
      + Nuevo pedido
    </button>
  </div>

  <!-- NAV TABS -->
  <div class="max-w-4xl mx-auto px-4 flex gap-0 border-t border-blue-500">
    <button onclick="irSeccion('pedidos')" id="nav-pedidos"
      class="nav-tab activo px-6 py-3 text-sm text-white border-b-3 border-transparent">
      📋 Pedidos
    </button>
    <button onclick="irSeccion('clientes')" id="nav-clientes"
      class="nav-tab px-6 py-3 text-sm text-blue-200 border-b-3 border-transparent">
      👥 Clientes
    </button>
  </div>
</header>

<!-- ══════════════════════════════════════════════
     SECCIÓN PEDIDOS
══════════════════════════════════════════════ -->
<div id="sec-pedidos">

  <!-- BÚSQUEDA + ORDEN -->
  <div class="max-w-4xl mx-auto px-4 mt-6 flex gap-2">
    <div class="relative flex-1">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
      <input id="buscador" type="text" placeholder="Buscar por código de boleta o nombre..."
        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
        oninput="renderPedidos()" />
    </div>
    <select id="orden" onchange="renderPedidos()"
      class="border border-slate-200 bg-white rounded-xl px-3 text-sm text-slate-600 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      <option value="desc">Más reciente</option>
      <option value="asc">Más antiguo</option>
    </select>
  </div>

  <!-- FILTROS PEDIDOS -->
  <div class="max-w-4xl mx-auto px-4 mt-4">
    <div class="flex gap-2 flex-wrap">
      <button onclick="setFiltroP('notif','todos')" id="tab-notif-todos" class="tab-btn px-4 py-1.5 rounded-full text-xs font-medium border transition">Todos</button>
      <button onclick="setFiltroP('notif','no')"    id="tab-notif-no"   class="tab-btn px-4 py-1.5 rounded-full text-xs font-medium border transition">📵 Sin avisar</button>
      <button onclick="setFiltroP('notif','si')"    id="tab-notif-si"   class="tab-btn px-4 py-1.5 rounded-full text-xs font-medium border transition">📨 Ya avisados</button>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 mt-2">
    <p id="contador" class="text-xs text-slate-400"></p>
  </div>

  <div id="lista-pedidos" class="max-w-4xl mx-auto px-4 mt-2 pb-20 space-y-3"></div>
  <div id="vacio-pedidos" class="hidden max-w-4xl mx-auto px-4 mt-16 text-center text-slate-400">
    <div class="text-5xl mb-3">🧺</div>
    <p class="text-lg font-medium">Sin resultados</p>
    <p class="text-sm">Prueba cambiando el filtro o busca otro código</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     SECCIÓN CLIENTES
══════════════════════════════════════════════ -->
<div id="sec-clientes" class="hidden">

  <div class="max-w-4xl mx-auto px-4 mt-6 flex gap-2">
    <div class="relative flex-1">
      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
      <input id="buscador-cli" type="text" placeholder="Buscar cliente por nombre o celular..."
        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
        oninput="renderClientes()" />
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-4 mt-2">
    <p id="contador-cli" class="text-xs text-slate-400"></p>
  </div>

  <div id="lista-clientes" class="max-w-4xl mx-auto px-4 mt-2 pb-20 space-y-3"></div>
  <div id="vacio-clientes" class="hidden max-w-4xl mx-auto px-4 mt-16 text-center text-slate-400">
    <div class="text-5xl mb-3">👥</div>
    <p class="text-lg font-medium">Sin clientes aún</p>
    <p class="text-sm">Los clientes aparecen aquí automáticamente cuando creas pedidos</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     MODAL DETALLE CLIENTE
══════════════════════════════════════════════ -->
<div id="modal-cliente" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg fade-in max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between px-6 pt-5 pb-3 border-b shrink-0">
      <h2 id="cli-titulo" class="text-lg font-semibold text-slate-800"></h2>
      <button onclick="cerrarModalCliente()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
    </div>
    <div id="cli-contenido" class="overflow-y-auto px-6 py-5 space-y-4"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     MODAL NUEVO / EDITAR PEDIDO
══════════════════════════════════════════════ -->
<div id="modal" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md fade-in">
    <div class="flex items-center justify-between px-6 pt-5 pb-3 border-b">
      <h2 id="modal-titulo" class="text-lg font-semibold text-slate-800">Nuevo pedido</h2>
      <button onclick="cerrarModal()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
    </div>
    <form id="form-cliente" class="px-6 py-5 space-y-4" onsubmit="guardarPedido(event)">
      <input type="hidden" id="edit-id" />
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Código de boleta *</label>
        <input id="f-codigo" type="text" required placeholder="Ej: A-0042"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nombre del cliente *</label>
        <input id="f-nombre" type="text" required placeholder="Ej: María García"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
          oninput="sugerirCliente(this.value)" autocomplete="off" />
        <!-- Sugerencias -->
        <div id="sugerencias" class="hidden border border-slate-200 rounded-lg mt-1 bg-white shadow-md overflow-hidden"></div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Celular WhatsApp *</label>
        <div class="flex gap-2">
          <span class="border border-slate-200 rounded-lg px-3 py-2 text-sm bg-slate-50 text-slate-500">+51</span>
          <input id="f-celular" type="tel" required placeholder="987 654 321"
            class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>
        <p class="text-xs text-slate-400 mt-1">Sin el +51. Ej: 987654321</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Nota (opcional)</label>
        <input id="f-nota" type="text" placeholder="Ej: 3 camisas, 2 pantalones"
          class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div class="flex gap-3 pt-1">
        <button type="button" onclick="cerrarModal()"
          class="flex-1 border border-slate-200 text-slate-600 rounded-lg py-2 text-sm font-medium hover:bg-slate-50">Cancelar</button>
        <button type="submit"
          class="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-blue-700">Guardar</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL DETALLE PEDIDO -->
<div id="modal-detalle" class="hidden fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md fade-in">
    <div class="flex items-center justify-between px-6 pt-5 pb-3 border-b">
      <h2 class="text-lg font-semibold text-slate-800">Detalle del pedido</h2>
      <button onclick="cerrarDetalle()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
    </div>
    <div id="detalle-contenido" class="px-6 py-5 space-y-4"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-sm px-5 py-3 rounded-xl shadow-lg z-50"></div>

<script>
const KEY = 'aquaman_crm_v1';
let filtroEstado = 'todos';
let filtroNotif  = 'todos';
let seccionActiva = 'pedidos';

function cargar() { return JSON.parse(localStorage.getItem(KEY) || '[]'); }
function guardar(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function fechaCorta(ts) {
  if (!ts) return '';
  return new Date(Number(ts)).toLocaleDateString('es-PE', { day:'2-digit', month:'short', year:'numeric' });
}
function fechaMes(ts) {
  if (!ts) return '';
  return new Date(Number(ts)).toLocaleDateString('es-PE', { month:'long', year:'numeric' });
}

function urlWA(c) {
  const tel = '51' + c.celular.replace(/\D/g,'');
  const msg = `Hola ${c.nombre} 👋, te avisamos que tu ropa de la *Lavandería Aquaman* ya está lavada, doblada y perfumada lista para recoger.🤩\n\n📋 Boleta: *${c.codigo}*\n\n¡Te esperamos! 🌊`;
  return `https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(msg)}`;
}

const WA_SVG = `<svg style="width:15px;height:15px;flex-shrink:0" viewBox="0 0 24 24" fill="currentColor">
  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
  <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.859L0 24l6.303-1.504A11.947 11.947 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.366l-.358-.214-3.742.893.938-3.641-.234-.373A9.818 9.818 0 0112 2.182c5.425 0 9.818 4.393 9.818 9.818 0 5.426-4.393 9.818-9.818 9.818z"/>
</svg>`;

// ─── NAVEGACIÓN ───────────────────────────────────────────────
function irSeccion(sec) {
  seccionActiva = sec;
  document.getElementById('sec-pedidos').classList.toggle('hidden', sec !== 'pedidos');
  document.getElementById('sec-clientes').classList.toggle('hidden', sec !== 'clientes');
  document.getElementById('nav-pedidos').classList.toggle('activo', sec === 'pedidos');
  document.getElementById('nav-clientes').classList.toggle('activo', sec === 'clientes');
  document.getElementById('nav-pedidos').classList.toggle('text-white', sec === 'pedidos');
  document.getElementById('nav-pedidos').classList.toggle('text-blue-200', sec !== 'pedidos');
  document.getElementById('nav-clientes').classList.toggle('text-white', sec === 'clientes');
  document.getElementById('nav-clientes').classList.toggle('text-blue-200', sec !== 'clientes');
  document.getElementById('btn-nuevo').textContent = sec === 'pedidos' ? '+ Nuevo pedido' : '';
  document.getElementById('btn-nuevo').style.display = sec === 'pedidos' ? '' : 'none';
  if (sec === 'clientes') renderClientes();
  else renderPedidos();
}

// ─── RENDER PEDIDOS ───────────────────────────────────────────
function renderPedidos() {
  const lista = document.getElementById('lista-pedidos');
  const vacio = document.getElementById('vacio-pedidos');
  const q     = document.getElementById('buscador').value.toLowerCase().trim();
  const orden = document.getElementById('orden').value;
  let datos   = cargar();

  if (filtroEstado !== 'todos') datos = datos.filter(c => c.estado === filtroEstado);
  if (filtroNotif === 'si')     datos = datos.filter(c => c.notificado);
  if (filtroNotif === 'no')     datos = datos.filter(c => !c.notificado);
  if (q) datos = datos.filter(c =>
    c.codigo.toLowerCase().includes(q) || c.nombre.toLowerCase().includes(q));

  datos.sort((a,b) => orden==='desc' ? Number(b.id)-Number(a.id) : Number(a.id)-Number(b.id));

  const total     = cargar();
  const sinAvisar = total.filter(c => !c.notificado && c.estado !== 'recogido').length;
  document.getElementById('contador').textContent =
    `${datos.length} pedido${datos.length!==1?'s':''} · ${sinAvisar} sin avisar`;

  lista.innerHTML = '';
  if (datos.length === 0) { vacio.classList.remove('hidden'); return; }
  vacio.classList.add('hidden');

  datos.forEach(c => {
    const card = document.createElement('div');
    card.className = 'bg-white rounded-xl border shadow-sm px-5 py-4 flex items-center gap-3 fade-in cursor-pointer hover:shadow-md transition ' +
      (c.notificado ? 'border-slate-100' : 'border-orange-100');
    card.onclick = () => abrirDetalle(c.id);

    const btnWA = c.notificado
      ? `<a href="${urlWA(c)}" target="_blank" rel="noopener"
            onclick="event.stopPropagation(); registrarAviso('${c.id}')"
            class="wa-btn wa-btn-reenviar shrink-0">${WA_SVG} Reenviar</a>`
      : `<a href="${urlWA(c)}" target="_blank" rel="noopener"
            onclick="event.stopPropagation(); registrarAviso('${c.id}')"
            class="wa-btn wa-btn-nuevo shrink-0">${WA_SVG} Avisar recojo</a>`;

    const notifBadge = c.notificado
      ? `<span class="notif-si text-xs font-semibold px-2 py-0.5 rounded-full">📨 Avisado</span>`
      : `<span class="notif-no text-xs font-semibold px-2 py-0.5 rounded-full">📵 Sin avisar</span>`;

    card.innerHTML = `
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5 flex-wrap">
          <span class="font-mono text-sm font-bold text-blue-600">${c.codigo}</span>
          ${notifBadge}
        </div>
        <p class="font-semibold text-slate-800 mt-0.5 truncate">${c.nombre}</p>
        <p class="text-xs text-slate-400 mt-0.5">
          📅 ${fechaCorta(c.id)}${c.nota ? ' · '+c.nota : ''}${c.fechaAviso ? ' · ✉️ avisado '+c.fechaAviso : ''}
        </p>
      </div>
      ${btnWA}`;
    lista.appendChild(card);
  });
}

function labelEstado(e) {
  return { pendiente:'⏳ En proceso', listo:'✅ Lista', recogido:'📦 Recogida' }[e] || e;
}

// ─── RENDER CLIENTES ──────────────────────────────────────────
function renderClientes() {
  const lista = document.getElementById('lista-clientes');
  const vacio = document.getElementById('vacio-clientes');
  const q     = document.getElementById('buscador-cli').value.toLowerCase().trim();
  const datos = cargar();

  // Agrupar por nombre+celular
  const mapa = {};
  datos.forEach(p => {
    const key = p.nombre.trim().toLowerCase() + '|' + p.celular.replace(/\D/g,'');
    if (!mapa[key]) mapa[key] = { nombre: p.nombre, celular: p.celular, pedidos: [] };
    mapa[key].pedidos.push(p);
  });

  let clientes = Object.values(mapa);
  if (q) clientes = clientes.filter(c =>
    c.nombre.toLowerCase().includes(q) || c.celular.includes(q));

  // Ordenar por pedido más reciente
  clientes.sort((a,b) => {
    const maxA = Math.max(...a.pedidos.map(p => Number(p.id)));
    const maxB = Math.max(...b.pedidos.map(p => Number(p.id)));
    return maxB - maxA;
  });

  document.getElementById('contador-cli').textContent =
    `${clientes.length} cliente${clientes.length!==1?'s':''} · ${datos.length} pedidos en total`;

  lista.innerHTML = '';
  if (clientes.length === 0) { vacio.classList.remove('hidden'); return; }
  vacio.classList.add('hidden');

  clientes.forEach(c => {
    const total    = c.pedidos.length;
    const recogidos = c.pedidos.filter(p => p.estado === 'recogido').length;
    const pendientes = c.pedidos.filter(p => p.estado !== 'recogido').length;
    const ultimoPedido = c.pedidos.reduce((a,b) => Number(a.id)>Number(b.id)?a:b);

    const card = document.createElement('div');
    card.className = 'bg-white rounded-xl border border-slate-100 shadow-sm px-5 py-4 flex items-center gap-4 fade-in cursor-pointer hover:shadow-md transition';
    card.onclick = () => abrirModalCliente(c);
    card.innerHTML = `
      <div class="w-11 h-11 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-lg shrink-0">
        ${c.nombre.trim()[0].toUpperCase()}
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-slate-800 truncate">${c.nombre}</p>
        <p class="text-xs text-slate-400">+51 ${c.celular} · último pedido: ${fechaCorta(ultimoPedido.id)}</p>
      </div>
      <div class="text-right shrink-0">
        <p class="text-lg font-bold text-blue-600">${total}</p>
        <p class="text-xs text-slate-400">${total===1?'pedido':'pedidos'}</p>
        ${pendientes > 0 ? `<p class="text-xs text-orange-500 font-semibold">${pendientes} activo${pendientes!==1?'s':''}</p>` : '<p class="text-xs text-green-600">todo recogido</p>'}
      </div>
    `;
    lista.appendChild(card);
  });
}

// ─── MODAL DETALLE CLIENTE ────────────────────────────────────
function abrirModalCliente(c) {
  document.getElementById('cli-titulo').textContent = c.nombre;

  // Agrupar pedidos por mes
  const porMes = {};
  c.pedidos.forEach(p => {
    const mes = fechaMes(p.id);
    if (!porMes[mes]) porMes[mes] = [];
    porMes[mes].push(p);
  });
  // Ordenar meses desc
  const meses = Object.keys(porMes).sort((a,b) => {
    const maxA = Math.max(...porMes[a].map(p=>Number(p.id)));
    const maxB = Math.max(...porMes[b].map(p=>Number(p.id)));
    return maxB - maxA;
  });

  const total     = c.pedidos.length;
  const recogidos = c.pedidos.filter(p=>p.estado==='recogido').length;

  let html = `
    <div class="flex items-center gap-4 bg-blue-50 rounded-xl px-4 py-3">
      <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-xl">
        ${c.nombre.trim()[0].toUpperCase()}
      </div>
      <div>
        <p class="font-semibold text-slate-800">${c.nombre}</p>
        <p class="text-sm text-slate-500">+51 ${c.celular}</p>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-3 text-center">
      <div class="bg-slate-50 rounded-xl py-3">
        <p class="text-2xl font-bold text-blue-600">${total}</p>
        <p class="text-xs text-slate-400">Pedidos</p>
      </div>
      <div class="bg-slate-50 rounded-xl py-3">
        <p class="text-2xl font-bold text-green-600">${recogidos}</p>
        <p class="text-xs text-slate-400">Recogidos</p>
      </div>
      <div class="bg-slate-50 rounded-xl py-3">
        <p class="text-2xl font-bold text-orange-500">${total-recogidos}</p>
        <p class="text-xs text-slate-400">Activos</p>
      </div>
    </div>
    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wide">Historial de pedidos</p>`;

  meses.forEach(mes => {
    const pedidos = porMes[mes].sort((a,b) => Number(b.id)-Number(a.id));
    html += `<div>
      <p class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2 capitalize">${mes}</p>
      <div class="space-y-2">`;
    pedidos.forEach(p => {
      const notifBadge = p.notificado
        ? `<span class="notif-si text-xs font-semibold px-2 py-0.5 rounded-full">📨 Avisado</span>`
        : `<span class="notif-no text-xs font-semibold px-2 py-0.5 rounded-full">📵 Sin avisar</span>`;
      html += `
        <div class="flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2.5 cursor-pointer hover:bg-slate-100 transition"
             onclick="cerrarModalCliente(); setTimeout(()=>abrirDetalle('${p.id}'),50)">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5 flex-wrap">
              <span class="font-mono text-sm font-bold text-blue-600">${p.codigo}</span>
              ${notifBadge}
            </div>
            <p class="text-xs text-slate-400 mt-0.5">📅 ${fechaCorta(p.id)}${p.nota?' · '+p.nota:''}</p>
          </div>
          <a href="${urlWA(p)}" target="_blank" rel="noopener"
             onclick="event.stopPropagation(); registrarAviso('${p.id}')"
             class="wa-btn ${p.notificado?'wa-btn-reenviar':'wa-btn-nuevo'} shrink-0 text-xs px-2 py-1.5">
            ${WA_SVG} ${p.notificado?'Reenviar':'Avisar'}
          </a>
        </div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('cli-contenido').innerHTML = html;
  document.getElementById('modal-cliente').classList.remove('hidden');
}
function cerrarModalCliente() {
  document.getElementById('modal-cliente').classList.add('hidden');
}

// ─── REGISTRAR AVISO ──────────────────────────────────────────
function registrarAviso(id) {
  const datos = cargar();
  const idx   = datos.findIndex(x => x.id === id);
  if (idx < 0) return;
  datos[idx].notificado = true;
  datos[idx].fechaAviso = new Date().toLocaleDateString('es-PE', { day:'2-digit', month:'short' });
  guardar(datos);
  setTimeout(() => { renderPedidos(); if (seccionActiva==='clientes') renderClientes(); }, 300);
  mostrarToast('✅ Aviso enviado por WhatsApp');
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2500);
}

// ─── SUGERENCIAS AL ESCRIBIR NOMBRE ──────────────────────────
function sugerirCliente(q) {
  const box = document.getElementById('sugerencias');
  if (!q || q.length < 2) { box.classList.add('hidden'); return; }
  const datos = cargar();
  const mapa  = {};
  datos.forEach(p => {
    const key = p.nombre.trim().toLowerCase() + '|' + p.celular;
    if (!mapa[key]) mapa[key] = { nombre: p.nombre, celular: p.celular };
  });
  const matches = Object.values(mapa).filter(c =>
    c.nombre.toLowerCase().includes(q.toLowerCase())).slice(0,4);
  if (matches.length === 0) { box.classList.add('hidden'); return; }
  box.innerHTML = matches.map(c => `
    <div onclick="elegirCliente('${c.nombre.replace(/'/g,"\\'")}','${c.celular}')"
      class="px-3 py-2 text-sm hover:bg-blue-50 cursor-pointer border-b border-slate-100 last:border-0">
      <span class="font-medium text-slate-800">${c.nombre}</span>
      <span class="text-slate-400 text-xs ml-2">+51 ${c.celular}</span>
    </div>`).join('');
  box.classList.remove('hidden');
}
function elegirCliente(nombre, celular) {
  document.getElementById('f-nombre').value  = nombre;
  document.getElementById('f-celular').value = celular;
  document.getElementById('sugerencias').classList.add('hidden');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#f-nombre') && !e.target.closest('#sugerencias'))
    document.getElementById('sugerencias').classList.add('hidden');
});

// ─── FILTROS PEDIDOS ──────────────────────────────────────────
function setFiltroP(tipo, valor) {
  if (tipo === 'estado') {
    filtroEstado = valor;
    document.querySelectorAll('[id^="tab-estado-"]').forEach(b => b.classList.remove('tab-activo'));
    document.getElementById('tab-estado-'+valor).classList.add('tab-activo');
  } else {
    filtroNotif = valor;
    document.querySelectorAll('[id^="tab-notif-"]').forEach(b => b.classList.remove('tab-activo'));
    document.getElementById('tab-notif-'+valor).classList.add('tab-activo');
  }
  renderPedidos();
}

// ─── MODAL PEDIDO ─────────────────────────────────────────────
function abrirModalNuevo() {
  document.getElementById('modal-titulo').textContent = 'Nuevo pedido';
  document.getElementById('edit-id').value = '';
  document.getElementById('form-cliente').reset();
  document.getElementById('sugerencias').classList.add('hidden');
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('f-codigo').focus(), 50);
}
function abrirModalEditar(id) {
  const c = cargar().find(x => x.id === id);
  if (!c) return;
  document.getElementById('modal-titulo').textContent = 'Editar pedido';
  document.getElementById('edit-id').value  = c.id;
  document.getElementById('f-codigo').value = c.codigo;
  document.getElementById('f-nombre').value = c.nombre;
  document.getElementById('f-celular').value= c.celular;
  document.getElementById('f-nota').value   = c.nota || '';
  cerrarDetalle();
  document.getElementById('modal').classList.remove('hidden');
}
function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }

function guardarPedido(e) {
  e.preventDefault();
  const datos  = cargar();
  const editId = document.getElementById('edit-id').value;
  const nuevo  = {
    id:         editId || Date.now().toString(),
    codigo:     document.getElementById('f-codigo').value.trim().toUpperCase(),
    nombre:     document.getElementById('f-nombre').value.trim(),
    celular:    document.getElementById('f-celular').value.trim().replace(/\D/g,''),
    nota:       document.getElementById('f-nota').value.trim(),
    estado:     'pendiente',
    notificado: false,
    fechaAviso: null,
  };
  if (editId) {
    const idx = datos.findIndex(x => x.id === editId);
    nuevo.estado     = datos[idx].estado;
    nuevo.notificado = datos[idx].notificado;
    nuevo.fechaAviso = datos[idx].fechaAviso;
    datos[idx] = nuevo;
  } else {
    datos.push(nuevo);
  }
  guardar(datos);
  cerrarModal();
  renderPedidos();
}

// ─── DETALLE PEDIDO ───────────────────────────────────────────
function abrirDetalle(id) {
  const c = cargar().find(x => x.id === id);
  if (!c) return;

  const notifInfo = c.notificado
    ? `<div class="flex items-center gap-2 bg-green-50 border border-green-100 rounded-lg px-3 py-2">
         <span class="text-green-600 text-lg">📨</span>
         <div><p class="text-sm font-semibold text-green-700">Ya fue avisado</p>
         ${c.fechaAviso?`<p class="text-xs text-green-500">el ${c.fechaAviso}</p>`:''}</div>
       </div>`
    : `<div class="flex items-center gap-2 bg-orange-50 border border-orange-100 rounded-lg px-3 py-2">
         <span class="text-orange-500 text-lg">📵</span>
         <p class="text-sm font-semibold text-orange-600">Aún no fue avisado</p>
       </div>`;

  const btnWA = c.notificado
    ? `<a href="${urlWA(c)}" target="_blank" rel="noopener" onclick="registrarAviso('${c.id}')"
          class="wa-btn wa-btn-reenviar flex-1 py-2.5 text-sm rounded-lg">${WA_SVG} Reenviar aviso</a>`
    : `<a href="${urlWA(c)}" target="_blank" rel="noopener" onclick="registrarAviso('${c.id}')"
          class="wa-btn wa-btn-nuevo flex-1 py-2.5 text-sm rounded-lg">${WA_SVG} Avisar recojo por WhatsApp</a>`;

  document.getElementById('detalle-contenido').innerHTML = `
    <div class="flex items-center justify-between flex-wrap gap-2">
      <span class="font-mono text-2xl font-bold text-blue-600">${c.codigo}</span>
    </div>
    ${notifInfo}
    <div class="space-y-2 text-sm">
      <div><span class="text-slate-400">Cliente:</span> <span class="font-semibold text-slate-800">${c.nombre}</span></div>
      <div><span class="text-slate-400">Celular:</span> <span class="text-slate-800">+51 ${c.celular}</span></div>
      <div><span class="text-slate-400">Ingreso:</span> <span class="text-slate-700">📅 ${fechaCorta(c.id)}</span></div>
      ${c.nota?`<div><span class="text-slate-400">Nota:</span> <span class="text-slate-700">${c.nota}</span></div>`:''}
    </div>
    <div class="flex gap-2">${btnWA}</div>
    <div class="flex gap-2">
      <button onclick="abrirModalEditar('${c.id}')"
        class="flex-1 border border-slate-200 text-slate-600 rounded-lg py-2 text-sm font-medium hover:bg-slate-50">Editar</button>
      <button onclick="eliminarPedido('${c.id}')"
        class="flex-1 border border-red-100 text-red-500 rounded-lg py-2 text-sm font-medium hover:bg-red-50">Eliminar</button>
    </div>`;
  document.getElementById('modal-detalle').classList.remove('hidden');
}
function cerrarDetalle() { document.getElementById('modal-detalle').classList.add('hidden'); }

function cambiarEstado(id, estado) {
  const datos = cargar();
  const idx   = datos.findIndex(x => x.id === id);
  datos[idx].estado = estado;
  guardar(datos);
  cerrarDetalle();
  renderPedidos();
  setTimeout(() => abrirDetalle(id), 50);
}
function eliminarPedido(id) {
  if (!confirm('¿Eliminar este pedido?')) return;
  guardar(cargar().filter(x => x.id !== id));
  cerrarDetalle();
  renderPedidos();
}

// ─── ESC / CLICK FUERA ────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { cerrarModal(); cerrarDetalle(); cerrarModalCliente(); }
});
['modal','modal-detalle','modal-cliente'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    if (e.target.id === id) { cerrarModal(); cerrarDetalle(); cerrarModalCliente(); }
  });
});

// ─── INIT ─────────────────────────────────────────────────────
setFiltroP('estado','todos');
setFiltroP('notif','todos');
renderPedidos();
</script>
</body>
</html>
